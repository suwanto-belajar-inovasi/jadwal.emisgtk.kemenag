<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Jadwal Pelajaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-bg { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); color: white; border-radius: 12px 12px 0 0; }
        .table-input select { border: 1px solid #dee2e6; border-radius: 6px; width: 100%; padding: 6px; }
        .table-input th { background-color: #f8f9fa; text-align: center; vertical-align: middle; }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .jam-col { width: 100px; text-align: center; font-weight: bold; background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h5 id="loader-text">Memuat Data Referensi...</h5>
    </div>

    <div class="container my-4">
        <div class="card">
            <div class="card-header header-bg p-4 d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="fas fa-calendar-alt me-2"></i> Form Input Jadwal KBM</h4>
            </div>
            <div class="card-body p-4">
                
                <div class="row mb-4 g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Hari</label>
                        <select id="selectHari" class="form-select form-select-lg">
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Rombongan Belajar (Rombel)</label>
                        <select id="selectRombel" class="form-select form-select-lg">
                            <option value="">-- Pilih Rombel --</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-input align-middle" id="tabelJadwal">
                        <thead>
                            <tr>
                                <th class="jam-col">Jam Ke</th>
                                <th>Mata Pelajaran</th>
                                <th>Guru Pengajar (PTK)</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyJadwal">
                            </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button class="btn btn-primary btn-lg px-5" onclick="simpanJadwal()">
                        <i class="fas fa-save me-2"></i> Simpan Jadwal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby7ofQ9mOPqI_meowTNUsKxud2GyPUJNzLSsEiovM_DjrvMIWxKOKg-MEtvvXEr-S2u/exec'; 
        
        let referensi = { ptk: [], mapel: [], rombel: [] };
        const totalJam = 10; // Sesuaikan dengan maksimal jam pelajaran per hari

        // Inisialisasi Aplikasi
        document.addEventListener('DOMContentLoaded', () => {
            fetchReferensi();
            generateTableRows();
        });

        // 1. Fetch Data dari GAS
        async function fetchReferensi() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getReferences`);
                referensi = await response.json();
                
                populateDropdownRombel();
                populateDropdownsTable();
                
                document.getElementById('loader').style.display = 'none';
            } catch (error) {
                document.getElementById('loader-text').innerText = "Gagal memuat data. Periksa koneksi/URL.";
                document.getElementById('loader-text').classList.add('text-danger');
            }
        }

        // 2. Isi Dropdown Rombel
        function populateDropdownRombel() {
            const selRombel = document.getElementById('selectRombel');
            referensi.rombel.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r['Nama Rombel'];
                opt.text = `${r['Nama Rombel']} (Tingkat ${r['Tingkat/Kelas']})`;
                opt.dataset.kelas = r['Tingkat/Kelas'];
                selRombel.appendChild(opt);
            });
        }

        // 3. Generate Baris Tabel
        function generateTableRows() {
            const tbody = document.getElementById('tbodyJadwal');
            let html = '';
            for (let i = 1; i <= totalJam; i++) {
                // Tambahkan waktu istirahat secara visual (opsional, misal jam ke-4)
                if(i === 5) {
                    html += `<tr><td colspan="3" class="text-center bg-light text-muted fw-bold">ISTIRAHAT</td></tr>`;
                }
                
                html += `
                <tr class="jadwal-row" data-jam="${i}">
                    <td class="jam-col">${i}</td>
                    <td><select class="form-select select-mapel"><option value="">- Pilih Mapel -</option></select></td>
                    <td><select class="form-select select-ptk"><option value="">- Pilih Guru -</option></select></td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        // 4. Isi Dropdown di dalam Tabel
        function populateDropdownsTable() {
            const mapelOptions = referensi.mapel.map(m => `<option value="${m['ID Mapel']}">${m['Nama Mata Pelajaran']}</option>`).join('');
            const ptkOptions = referensi.ptk.map(p => `<option value="${p['ID PTK']}">${p['Nama']}</option>`).join('');

            document.querySelectorAll('.select-mapel').forEach(sel => sel.innerHTML += mapelOptions);
            document.querySelectorAll('.select-ptk').forEach(sel => sel.innerHTML += ptkOptions);
        }

        // 5. Eksekusi Simpan Data
        async function simpanJadwal() {
            const selHari = document.getElementById('selectHari').value;
            const selRombel = document.getElementById('selectRombel');
            const rombelVal = selRombel.value;
            
            if (!rombelVal) {
                Swal.fire('Peringatan', 'Silakan pilih Rombel terlebih dahulu!', 'warning');
                return;
            }

            const kelasVal = selRombel.options[selRombel.selectedIndex].dataset.kelas;
            const jadwalList = [];

            document.querySelectorAll('.jadwal-row').forEach(row => {
                const jam = row.dataset.jam;
                const idMapel = row.querySelector('.select-mapel').value;
                const idPtk = row.querySelector('.select-ptk').value;
                
                if (idMapel || idPtk) {
                    jadwalList.push({ jam: jam, idMapel: idMapel, idPtk: idPtk });
                }
            });

            if (jadwalList.length === 0) {
                Swal.fire('Peringatan', 'Form jadwal masih kosong!', 'warning');
                return;
            }

            const payload = {
                hari: selHari,
                rombel: rombelVal,
                kelas: kelasVal,
                jadwal: jadwalList
            };

            // Animasi Loading SweetAlert
            Swal.fire({
                title: 'Menyimpan Jadwal...',
                html: 'Tunggu sebentar, data sedang direkap ke Spreadsheet.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    // Penggunaan text/plain krusial untuk koneksi GitHub Pages ke GAS
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    Swal.fire('Berhasil!', `Jadwal ${rombelVal} hari ${selHari} berhasil disimpan.`, 'success');
                } else {
                    Swal.fire('Error', result.message, 'error');
                }
            } catch (error) {
                Swal.fire('Koneksi Gagal', 'Gagal terhubung ke server database.', 'error');
            }
        }
    </script>
</body>
</html>
