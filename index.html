<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Jadwal Madrasah Terpadu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .hidden { display: none !important; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bg-primary-grad { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); color: white; }
        .select2-container .select2-selection--single { height: 38px; line-height: 38px; border: 1px solid #dee2e6; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 38px; }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay hidden">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h5 id="loaderText">Memproses...</h5>
    </div>

    <div id="authArea" class="container mt-5" style="max-width: 500px;">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="fas fa-school text-primary"></i> Portal Madrasah</h3>
            
            <div id="loginForm">
                <input type="text" id="logUser" class="form-control mb-3" placeholder="Username">
                <input type="password" id="logPass" class="form-control mb-3" placeholder="Password">
                <button class="btn btn-primary w-100 mb-2" onclick="login()">Masuk</button>
                <div class="text-center">Belum punya akun? <a href="#" onclick="toggleAuth('register')">Daftar di sini</a></div>
            </div>

            <div id="registerForm" class="hidden">
                <input type="text" id="regUser" class="form-control mb-3" placeholder="Username Baru">
                <input type="password" id="regPass" class="form-control mb-3" placeholder="Password Baru">
                <input type="text" id="regMadrasah" class="form-control mb-3" placeholder="Nama Madrasah">
                <button class="btn btn-success w-100 mb-2" onclick="register()">Daftar & Buat Database</button>
                <div class="text-center">Sudah punya akun? <a href="#" onclick="toggleAuth('login')">Masuk</a></div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary-grad">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="fas fa-calendar-alt"></i> E-Jadwal <span id="namaMadrasahNav"></span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link active" href="#" onclick="switchMenu('input')">Input Jadwal</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="switchMenu('dashboard'); renderDashboard();">Dashboard</a></li>
                    </ul>
                    <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Keluar</button>
                </div>
            </div>
        </nav>

        <div class="container my-4">
            
            <div id="viewInput">
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="fw-bold">Hari</label>
                                <select id="selectHari" class="form-select">
                                    <option value="Senin">Senin</option><option value="Selasa">Selasa</option>
                                    <option value="Rabu">Rabu</option><option value="Kamis">Kamis</option>
                                    <option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="fw-bold">Rombel</label>
                                <select id="selectRombel" class="form-select"><option value="">-- Pilih Rombel --</option></select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="table table-bordered align-middle">
                            <thead class="table-light">
                                <tr><th>Jam</th><th>Mata Pelajaran (Ketik untuk filter)</th><th>Guru (Ketik untuk filter)</th></tr>
                            </thead>
                            <tbody id="tbodyJadwal"></tbody>
                        </table>
                        <button class="btn btn-primary w-100 mt-3" onclick="simpanJadwal()"><i class="fas fa-save"></i> Simpan & Render</button>
                    </div>
                </div>
            </div>

            <div id="viewDashboard" class="hidden">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Hasil Jadwal Seluruh Rombel</h5>
                        <button class="btn btn-success" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> Download Excel</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="tabelDashboard">
                                <thead><tr><th>Hari</th><th>Rombel</th><th>Jam Ke</th><th>Mata Pelajaran</th><th>Guru</th></tr></thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPA6muRu16SEEOaZyR4YgdkTeYN5P2hZtH4bzr_irm8iresVt3byo5vXzWlqWn4K43/exec'; 
        let appData = { madrasah: '', ssId: '', ref: {}, jadwalGlobal: [] };

        // Cek Session saat reload
        window.onload = () => {
            const savedSession = localStorage.getItem('jadwalSession');
            if(savedSession) {
                let session = JSON.parse(savedSession);
                appData.madrasah = session.madrasah;
                appData.ssId = session.ssId;
                showApp();
            }
        };

        function showLoading(text) { $('#loaderText').text(text); $('#loader').removeClass('hidden'); }
        function hideLoading() { $('#loader').addClass('hidden'); }

        // --- AUTHENTICATION ---
        function toggleAuth(type) {
            if(type === 'register') { $('#loginForm').addClass('hidden'); $('#registerForm').removeClass('hidden'); }
            else { $('#registerForm').addClass('hidden'); $('#loginForm').removeClass('hidden'); }
        }

        async function register() {
            let user = $('#regUser').val(), pass = $('#regPass').val(), madrasah = $('#regMadrasah').val();
            if(!user || !pass || !madrasah) return Swal.fire('Error', 'Isi semua data!', 'warning');
            showLoading('Membuat Database Madrasah...');
            let res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'register', username: user, password: pass, madrasah: madrasah }) }).then(r=>r.json());
            hideLoading();
            if(res.status === 'success') { Swal.fire('Berhasil', res.message, 'success'); toggleAuth('login'); }
            else Swal.fire('Gagal', res.message, 'error');
        }

        async function login() {
            let user = $('#logUser').val(), pass = $('#logPass').val();
            if(!user || !pass) return Swal.fire('Error', 'Isi username & password!', 'warning');
            showLoading('Autentikasi...');
            let res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: user, password: pass }) }).then(r=>r.json());
            hideLoading();
            if(res.status === 'success') {
                appData.madrasah = res.madrasah; appData.ssId = res.ssId;
                localStorage.setItem('jadwalSession', JSON.stringify({ madrasah: res.madrasah, ssId: res.ssId }));
                showApp();
            } else Swal.fire('Gagal', res.message, 'error');
        }

        function logout() { localStorage.removeItem('jadwalSession'); location.reload(); }

        // --- MAIN APP ---
        async function showApp() {
            $('#authArea').addClass('hidden'); $('#mainApp').removeClass('hidden');
            $('#namaMadrasahNav').text(`(${appData.madrasah})`);
            showLoading('Memuat Data & Jadwal Aktif...');
            let res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getData', ssId: appData.ssId }) }).then(r=>r.json());
            appData.ref = { ptk: res.ptk, mapel: res.mapel, rombel: res.rombel };
            appData.jadwalGlobal = res.jadwal;
            hideLoading();
            buildInterface();
        }

        function switchMenu(menu) {
            if(menu==='input') { $('#viewDashboard').addClass('hidden'); $('#viewInput').removeClass('hidden'); }
            else { $('#viewInput').addClass('hidden'); $('#viewDashboard').removeClass('hidden'); }
        }

        function buildInterface() {
            // Isi Rombel
            $('#selectRombel').empty().append('<option value="">-- Pilih Rombel --</option>');
            appData.ref.rombel.forEach(r => $('#selectRombel').append(`<option value="${r['Nama Rombel']}" data-kelas="${r['Tingkat/Kelas']}">${r['Nama Rombel']}</option>`));

            // Buat Baris Tabel Input
            let tbody = '';
            for(let i=1; i<=10; i++) {
                tbody += `<tr class="tr-jadwal" data-jam="${i}">
                    <td class="text-center fw-bold bg-light">${i}</td>
                    <td><select class="form-control sel2-mapel" style="width:100%"><option value=""></option></select></td>
                    <td><select class="form-control sel2-ptk" style="width:100%"><option value=""></option></select></td>
                </tr>`;
            }
            $('#tbodyJadwal').html(tbody);

            // Inisialisasi Select2 (Filter Pencarian Rekomendasi)
            $('.sel2-mapel').select2({ placeholder: "Ketik Nama Mapel...", data: appData.ref.mapel.map(m => ({id: m['ID Mapel'], text: m['Nama Mata Pelajaran']})) });
            $('.sel2-ptk').select2({ placeholder: "Ketik Nama Guru...", data: appData.ref.ptk.map(p => ({id: p['ID PTK'], text: p['Nama']})) });

            // DETEKSI BENTROK SAAT GURU DIPILIH
            $('.sel2-ptk').on('select2:select', function (e) {
                let guruPilih = e.params.data.id;
                let namaGuru = e.params.data.text;
                let jamTabel = $(this).closest('tr').data('jam');
                let hariTabel = $('#selectHari').val();
                let rombelSkrg = $('#selectRombel').val();

                // Cek dengan Jadwal Global (dari Database + yang belum di-save jika mau lebih ketat)
                let bentrok = appData.jadwalGlobal.find(j => j['Hari'] == hariTabel && j['Jam ke'] == jamTabel && j['ID PTK'] == guruPilih && j['Rombel'] != rombelSkrg);
                
                if(bentrok) {
                    Swal.fire({ icon: 'error', title: 'Jadwal Bentrok!', text: `${namaGuru} sudah memiliki jadwal di ${bentrok['Rombel']} pada Jam ke-${jamTabel} hari ${hariTabel}.` });
                    $(this).val(null).trigger('change'); // Batalkan pilihan
                }
            });
        }

        async function simpanJadwal() {
            let rombel = $('#selectRombel').val();
            let hari = $('#selectHari').val();
            if(!rombel) return Swal.fire('Peringatan', 'Pilih Rombel dahulu', 'warning');

            let kelas = $('#selectRombel').find(':selected').data('kelas');
            let dataJadwal = [];

            $('.tr-jadwal').each(function() {
                let jam = $(this).data('jam');
                let idMapel = $(this).find('.sel2-mapel').val();
                let idPtk = $(this).find('.sel2-ptk').val();
                let txtMapel = $(this).find('.sel2-mapel option:selected').text();
                let txtPtk = $(this).find('.sel2-ptk option:selected').text();

                if(idMapel && idPtk) dataJadwal.push({ jam, idMapel, idPtk, namaMapel: txtMapel, namaPtk: txtPtk });
            });

            if(dataJadwal.length === 0) return Swal.fire('Info', 'Belum ada jadwal yang diisi.', 'info');

            showLoading('Menyimpan ke Database...');
            let payload = { action: 'saveSchedule', ssId: appData.ssId, hari, rombel, kelas, jadwal: dataJadwal };
            let res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r=>r.json());
            hideLoading();
            
            if(res.status === 'success') {
                Swal.fire('Sukses', 'Jadwal berhasil disimpan & dirender.', 'success');
                // Refresh Jadwal Global di memori
                let refresh = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getData', ssId: appData.ssId }) }).then(r=>r.json());
                appData.jadwalGlobal = refresh.jadwal;
            }
        }

        function renderDashboard() {
            let tbody = '';
            // Mengurutkan jadwalGlobal berdasarkan Hari, Rombel, Jam
            let sorted = appData.jadwalGlobal.sort((a, b) => a['Hari'].localeCompare(b['Hari']) || a['Rombel'].localeCompare(b['Rombel']) || a['Jam ke'] - b['Jam ke']);
            
            sorted.forEach(j => {
                tbody += `<tr><td>${j['Hari']||'-'}</td><td>${j['Rombel']||'-'}</td><td>${j['Jam ke']||'-'}</td><td>${j['Nama Mapel']||'-'}</td><td>${j['Nama PTK']||'-'}</td></tr>`;
            });
            $('#tabelDashboard tbody').html(tbody);
        }

        function downloadExcel() {
            // Direct Link Google Sheets untuk konversi otomatis ke .xlsx (Berisi semua sheet Senin-Sabtu dalam 1 file)
            let exportUrl = `https://docs.google.com/spreadsheets/d/${appData.ssId}/export?format=xlsx`;
            window.open(exportUrl, '_blank');
        }
    </script>
</body>
</html>
